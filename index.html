<style>
  :root{
    --bg-deep:#E4F4FC;
    --board:#CFEBFA;
    --board-edge:#BBE0F6;
    --primary:#2472B4;
    --sky:#1E6FA8;
    --gold:#D79A2E;
    --gold-dim:#B98F45;
    --paper:#FFFFFF;
    --ink:#1C2B3A;
    --ink-soft:#4A5A6B;
    --header-text:#123A63;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg-deep);font-family:'Sarabun',sans-serif;color:var(--ink);overflow:hidden;}
  #app{width:100%;height:100vh;position:relative;}

  /* ---------- shared decorative bits ---------- */
  .felt-board{
    background:
      radial-gradient(circle at 20% 30%, rgba(20,60,100,0.045) 0, rgba(20,60,100,0.045) 2px, transparent 2px),
      radial-gradient(circle at 60% 70%, rgba(20,60,100,0.04) 0, rgba(20,60,100,0.04) 2px, transparent 2px),
      linear-gradient(160deg, var(--board) 0%, var(--board-edge) 100%);
    background-size: 34px 34px, 46px 46px, 100% 100%;
  }
  .drift{position:absolute;opacity:0.16;pointer-events:none;animation:driftMove 14s ease-in-out infinite;}
  @keyframes driftMove{
    0%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-18px) rotate(8deg);}
    100%{transform:translateY(0) rotate(0deg);}
  }

  /* ---------- WALL VIEW ---------- */
  .wall-root{width:100%;height:100%;display:flex;flex-direction:column;}
  .wall-header{
    padding:22px 40px 16px;
    display:flex;align-items:center;justify-content:center;gap:16px;
    position:relative;
    border-bottom:1px solid rgba(232,184,88,0.25);
  }
  .wall-header h1{
    font-family:'Mitr',sans-serif;font-weight:700;font-size:clamp(24px,3.2vw,42px);
    margin:0;color:var(--header-text);letter-spacing:0.5px;text-align:center;
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }
  .wall-header .sub{
    font-family:'Sarabun',sans-serif;font-size:clamp(12px,1.1vw,16px);color:var(--sky);
    display:block;margin-top:2px;font-weight:500;
  }
  .wall-body{flex:1;display:flex;gap:0;overflow:hidden;}
  .board-scroll{flex:1;overflow-y:auto;padding:28px 24px 40px;}
  .board-scroll::-webkit-scrollbar{width:10px;}
  .board-scroll::-webkit-scrollbar-thumb{background:rgba(232,184,88,0.35);border-radius:6px;}
  .board{display:flex;flex-wrap:wrap;gap:22px;align-content:flex-start;justify-content:center;}

  .sticker{
    background:var(--paper);color:var(--ink);
    width:210px;border-radius:8px;
    padding:14px 14px 16px;
    box-shadow:0 10px 22px rgba(0,0,0,0.32), 0 2px 4px rgba(0,0,0,0.15);
    position:relative;
    animation:stickIn 0.6s cubic-bezier(.2,1.4,.4,1) both;
  }
  .sticker::before{
    content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FBE3A5, var(--gold-dim));
    box-shadow:0 3px 5px rgba(0,0,0,0.4);
  }
  @keyframes stickIn{
    0%{transform:scale(0.3) rotate(-40deg);opacity:0;}
    60%{transform:scale(1.08) rotate(var(--rot));opacity:1;}
    100%{transform:scale(1) rotate(var(--rot));opacity:1;}
  }
  .sticker img{width:100%;height:150px;object-fit:cover;border-radius:5px;margin-bottom:8px;display:block;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);}
  .sticker .msg{font-size:14.5px;line-height:1.45;font-weight:500;word-break:break-word;}
  .sticker .icon-row{font-size:20px;margin-bottom:6px;}
  .sticker .from{margin-top:10px;font-family:'Mitr',sans-serif;font-size:12.5px;color:var(--primary);font-weight:600;text-align:right;}

  .empty-note{
    margin:auto;text-align:center;color:rgba(20,50,80,0.55);font-size:16px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }

  .qr-panel{
    width:300px;flex-shrink:0;
    background:linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0.15));
    border-left:1px solid rgba(36,114,180,0.2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 22px;gap:14px;text-align:center;
  }
  .qr-panel h2{font-family:'Mitr',sans-serif;font-size:20px;margin:0;font-weight:600;color:var(--header-text);}
  .qr-box{background:var(--paper);padding:14px;border-radius:14px;box-shadow:0 12px 30px rgba(20,60,100,0.18);}
  .qr-box img,.qr-box canvas{display:block;border-radius:4px;}
  .qr-panel p{font-size:13.5px;color:rgba(20,50,80,0.75);margin:0;line-height:1.5;max-width:230px;}
  .qr-panel .steps{text-align:left;font-size:13px;color:rgba(20,50,80,0.8);line-height:1.9;margin:6px 0 0;}
  .qr-panel .steps b{color:var(--primary);}

  .admin-gear{
    position:absolute;top:16px;right:18px;width:30px;height:30px;border-radius:50%;
    background:rgba(20,50,80,0.06);border:1px solid rgba(20,50,80,0.15);
    color:rgba(20,50,80,0.5);display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:15px;user-select:none;
  }
  .admin-gear:hover{color:var(--gold);border-color:var(--gold);}

  .confirm-overlay{
    position:fixed;inset:0;background:rgba(5,15,30,0.7);display:flex;align-items:center;justify-content:center;z-index:50;
  }
  .confirm-box{background:var(--paper);color:var(--ink);padding:26px 28px;border-radius:14px;max-width:320px;text-align:center;font-family:'Sarabun',sans-serif;}
  .confirm-box h3{font-family:'Mitr',sans-serif;margin:0 0 10px;color:var(--ink);}
  .confirm-box .btn-row{display:flex;gap:10px;margin-top:18px;}
  .confirm-box button{flex:1;padding:10px 0;border-radius:8px;border:none;font-family:'Mitr',sans-serif;font-weight:600;cursor:pointer;font-size:14px;}
  .btn-danger{background:#D65A5A;color:#fff;}
  .btn-neutral{background:#EDEDED;color:#333;}

  /* ---------- SUBMIT (MOBILE) VIEW ---------- */
  .submit-root{
    width:100%;height:100%;overflow-y:auto;
    background:radial-gradient(circle at 50% 0%, #BFE3F7 0%, var(--bg-deep) 60%);
    display:flex;justify-content:center;padding:32px 18px 50px;
  }
  .submit-card{
    width:100%;max-width:420px;background:var(--paper);color:var(--ink);
    border-radius:20px;padding:30px 24px 34px;box-shadow:0 20px 50px rgba(0,0,0,0.4);
    position:relative;
  }
  .submit-card::before{
    content:'';position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FBE3A5, var(--gold-dim));
    box-shadow:0 3px 6px rgba(0,0,0,0.4);
  }
  .submit-card h1{
    font-family:'Mitr',sans-serif;font-size:24px;margin:6px 0 2px;text-align:center;color:var(--ink);
  }
  .submit-card .lead{text-align:center;color:var(--ink-soft);font-size:14px;margin:0 0 22px;}
  label{display:block;font-family:'Mitr',sans-serif;font-size:13.5px;font-weight:600;color:var(--primary);margin:16px 0 6px;}
  input[type="text"], textarea{
    width:100%;border:1.5px solid #DCE3EA;border-radius:10px;padding:11px 13px;
    font-family:'Sarabun',sans-serif;font-size:15px;color:var(--ink);background:#FAFBFC;
    resize:none;
  }
  input[type="text"]:focus, textarea:focus{outline:none;border-color:var(--primary);background:#fff;}
  textarea{min-height:100px;line-height:1.5;}
  .file-btn{
    display:flex;align-items:center;gap:10px;border:1.5px dashed #C9D4DE;border-radius:10px;
    padding:12px 14px;cursor:pointer;font-size:14px;color:var(--ink-soft);background:#FAFBFC;
  }
  .file-btn:hover{border-color:var(--primary);color:var(--primary);}
  #photoInput{display:none;}
  .preview-wrap{margin-top:10px;position:relative;display:inline-block;}
  .preview-wrap img{max-width:100%;max-height:220px;border-radius:10px;display:block;}
  .preview-wrap .remove-photo{
    position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;
    width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;
  }
  .submit-btn{
    width:100%;margin-top:24px;padding:14px 0;border:none;border-radius:12px;
    background:linear-gradient(135deg, var(--primary), #1E5FA0);color:#fff;
    font-family:'Mitr',sans-serif;font-weight:600;font-size:16px;cursor:pointer;
    box-shadow:0 8px 18px rgba(47,128,196,0.35);
  }
  .submit-btn:disabled{opacity:0.6;cursor:default;}
  .err-text{color:#C0392B;font-size:13px;margin-top:10px;text-align:center;display:none;}
  .hint{font-size:12px;color:#8A96A3;margin-top:6px;}

  .thanks-screen{
    width:100%;max-width:420px;background:var(--paper);color:var(--ink);border-radius:20px;
    padding:50px 26px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.4);
  }
  .thanks-screen .big-icon{font-size:52px;margin-bottom:10px;}
  .thanks-screen h1{font-family:'Mitr',sans-serif;font-size:22px;margin:0 0 8px;}
  .thanks-screen p{color:var(--ink-soft);font-size:14.5px;line-height:1.6;margin:0 0 22px;}
  .again-btn{
    background:none;border:1.5px solid var(--primary);color:var(--primary);
    padding:10px 22px;border-radius:10px;font-family:'Mitr',sans-serif;font-weight:600;cursor:pointer;font-size:14px;
  }

  /* ---------- ADMIN VIEW ---------- */
  .admin-root{width:100%;height:100%;overflow-y:auto;background:var(--bg-deep);padding:26px 20px 50px;}
  .admin-wrap{max-width:640px;margin:0 auto;}
  .admin-wrap h1{font-family:'Mitr',sans-serif;color:var(--header-text);font-size:22px;margin:0 0 4px;}
  .admin-wrap .admin-sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 20px;}

  .pin-gate{
    max-width:340px;margin:18vh auto 0;background:var(--paper);border-radius:16px;
    padding:32px 26px;text-align:center;box-shadow:0 16px 40px rgba(20,60,100,0.2);
  }
  .pin-gate h2{font-family:'Mitr',sans-serif;font-size:19px;margin:0 0 14px;color:var(--ink);}
  .pin-gate input{
    width:100%;text-align:center;letter-spacing:4px;font-size:20px;padding:10px;
    border:1.5px solid #DCE3EA;border-radius:10px;margin-bottom:12px;
  }
  .pin-gate button{
    width:100%;padding:11px 0;border:none;border-radius:10px;background:var(--primary);color:#fff;
    font-family:'Mitr',sans-serif;font-weight:600;cursor:pointer;font-size:14.5px;
  }
  .pin-gate .pin-err{color:#C0392B;font-size:13px;margin-top:8px;display:none;}

  .quick-add{
    background:var(--paper);border-radius:14px;padding:18px 18px 20px;margin-bottom:22px;
    box-shadow:0 6px 18px rgba(20,60,100,0.12);
  }
  .quick-add h3{font-family:'Mitr',sans-serif;font-size:15px;margin:0 0 12px;color:var(--primary);}
  .quick-add input[type="text"], .quick-add textarea{
    width:100%;border:1.5px solid #DCE3EA;border-radius:8px;padding:9px 11px;
    font-family:'Sarabun',sans-serif;font-size:14px;margin-bottom:8px;resize:none;
  }
  .quick-add textarea{min-height:64px;}
  .quick-add .qa-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .quick-add .qa-file{font-size:12.5px;color:var(--ink-soft);}
  .quick-add button{
    padding:9px 18px;border:none;border-radius:8px;background:var(--primary);color:#fff;
    font-family:'Mitr',sans-serif;font-weight:600;cursor:pointer;font-size:13.5px;
  }

  .admin-item{
    background:var(--paper);border-radius:12px;padding:14px 16px;margin-bottom:12px;
    display:flex;gap:12px;align-items:flex-start;box-shadow:0 4px 12px rgba(20,60,100,0.1);
  }
  .admin-item img{width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;}
  .admin-item .ai-body{flex:1;min-width:0;}
  .admin-item .ai-msg{font-size:14px;color:var(--ink);word-break:break-word;line-height:1.4;}
  .admin-item .ai-meta{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .badge{display:inline-block;font-size:11px;font-family:'Mitr',sans-serif;font-weight:600;
    padding:2px 9px;border-radius:20px;margin-bottom:5px;}
  .badge-pending{background:#FDECC8;color:#9A6A16;}
  .badge-approved{background:#D9F0DE;color:#237A45;}
  .admin-item .ai-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  .admin-item .ai-actions button{
    border:none;border-radius:7px;padding:6px 12px;font-size:12.5px;font-family:'Mitr',sans-serif;
    font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .btn-approve{background:#2E9E5B;color:#fff;}
  .btn-reject{background:#D65A5A;color:#fff;}
  .admin-empty{text-align:center;color:var(--ink-soft);padding:30px 0;font-size:14px;}

  @media (max-width:900px){
    .wall-body{flex-direction:column;}
    .qr-panel{width:100%;border-left:none;border-top:1px solid rgba(232,184,88,0.25);flex-direction:row;flex-wrap:wrap;padding:16px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const mode = params.get('mode');
  const app = document.getElementById('app');

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function hashRotation(key){
    let h = 0;
    for(let i=0;i<key.length;i++){ h = (h*31 + key.charCodeAt(i)) % 10000; }
    return (h % 13) - 6; // -6deg .. +6deg
  }

  const FLOWER = '🌼', HEART = '💙';
  const ADMIN_PIN = '2569'; // เปลี่ยนรหัสนี้ก่อนใช้งานจริง

  // คำที่เข้าข่ายเสี่ยง/ไม่เหมาะสม -> ข้อความจะถูกพักไว้รอแอดมินตรวจสอบก่อนขึ้นจอ
  // แก้ไข/เพิ่มคำได้ตามต้องการ
  const RISKY_WORDS = [
    'เหี้ย','สัส','ควย','เย็ด','ไอ้สัตว์','ระยำ','xxx','sex','fuck','shit','damn','ตอแหล','ชิบหาย'
  ];
  function isRisky(text){
    if(!text) return false;
    const lower = text.toLowerCase();
    return RISKY_WORDS.some(w => lower.includes(w.toLowerCase()));
  }

  /* ===================== WALL VIEW ===================== */
  function renderWallShell(){
    app.innerHTML = `
      <div class="wall-root felt-board">
        <div class="drift" style="top:8%;left:4%;font-size:46px;">${FLOWER}</div>
        <div class="drift" style="top:70%;left:8%;font-size:34px;animation-delay:2s;">${HEART}</div>
        <div class="drift" style="top:14%;right:26%;font-size:30px;animation-delay:4s;">${HEART}</div>
        <div class="drift" style="top:78%;right:30%;font-size:40px;animation-delay:6s;">${FLOWER}</div>

        <div class="admin-gear" id="adminGear" title="ตั้งค่า">⚙</div>

        <div class="wall-header">
          <h1>${FLOWER} ตู้สติกเกอร์บอกรัก ${FLOWER}
            <span class="sub">สแกน QR โค้ด แล้วส่งคำอวยพรหรือรูปคู่กับคุณแม่ ให้ขึ้นจอทันที</span>
          </h1>
        </div>

        <div class="wall-body">
          <div class="board-scroll"><div class="board" id="board"></div></div>
          <div class="qr-panel">
            <h2>สแกนเพื่อบอกรักแม่</h2>
            <div class="qr-box" id="qrBox"></div>
            <div class="steps">
              <div>1. เปิดกล้องมือถือสแกน QR</div>
              <div>2. พิมพ์คำอวยพร หรือแนบรูปคู่กับคุณแม่</div>
              <div>3. กด <b>ติดสติกเกอร์</b> แล้วรอดูบนจอ ${HEART}</div>
            </div>
          </div>
        </div>
      </div>
    `;

    const qrUrl = location.origin + location.pathname + '?mode=submit';
    if(window.QRCode){
      new QRCode(document.getElementById('qrBox'), {
        text: qrUrl, width: 168, height: 168,
        colorDark: '#0F3160', colorLight: '#FFFCF5',
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    document.getElementById('adminGear').addEventListener('click', () => {
      const pin = prompt('ใส่รหัสแอดมิน');
      if(pin === null) return;
      if(pin !== ADMIN_PIN){ alert('รหัสไม่ถูกต้อง'); return; }
      showClearConfirm();
    });
  }

  function showClearConfirm(){
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <h3>ล้างข้อความทั้งหมด?</h3>
        <p style="font-size:13.5px;color:#555;">สติกเกอร์ทั้งหมดบนจอจะถูกลบ ใช้เมื่อเริ่มงานใหม่เท่านั้น</p>
        <div class="btn-row">
          <button class="btn-neutral" id="cancelClear">ยกเลิก</button>
          <button class="btn-danger" id="confirmClear">ล้างทั้งหมด</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('cancelClear').onclick = () => overlay.remove();
    document.getElementById('confirmClear').onclick = async () => {
      try{
        await firebase.database().ref('entries').remove();
        seenIds = new Set();
      }catch(e){ console.error(e); }
      overlay.remove();
    };
  }

  let seenIds = new Set();
  let firstLoad = true;

  function renderEntries(snapshot){
    const board = document.getElementById('board');
    if(!board) return;

    const items = [];
    snapshot.forEach(child => {
      const data = child.val();
      if(data && data.status === 'approved'){
        items.push({key: child.key, data});
      }
    });
    const topItems = items.slice(-60);

    if(topItems.length === 0){
      board.innerHTML = `<div class="empty-note"><div style="font-size:40px;">${FLOWER}</div>ยังไม่มีสติกเกอร์<br>สแกน QR ด้านขวาเพื่อเป็นคนแรก!</div>`;
      firstLoad = false;
      return;
    }

    board.innerHTML = '';
    topItems.forEach(({key, data}) => {
      const rot = hashRotation(key);
      const isNew = !seenIds.has(key);
      seenIds.add(key);
      const el = document.createElement('div');
      el.className = 'sticker';
      el.style.setProperty('--rot', rot + 'deg');
      el.style.transform = `rotate(${rot}deg)`;
      if(!isNew || firstLoad){ el.style.animation = 'none'; }
      el.innerHTML = `
        ${data.image ? `<img src="${data.image}" alt="รูปคู่กับคุณแม่">` : `<div class="icon-row">${HEART}</div>`}
        ${data.message ? `<div class="msg">${escapeHtml(data.message)}</div>` : ''}
        ${data.name ? `<div class="from">— ${escapeHtml(data.name)}</div>` : ''}
      `;
      board.appendChild(el);
    });
    firstLoad = false;
  }

  function startWall(){
    renderWallShell();
    if(!FIREBASE_READY){
      document.getElementById('board').innerHTML =
        `<div class="empty-note">${FLOWER}<br>ยังไม่ได้ตั้งค่า Firebase<br>แก้ไข firebaseConfig ในไฟล์ก่อนใช้งานจริง</div>`;
      return;
    }
    firebase.database().ref('entries').limitToLast(200).on('value', renderEntries, (err) => {
      console.error('Firebase read error', err);
    });
  }

  /* ===================== SUBMIT VIEW ===================== */
  let selectedImageDataUrl = null;

  function renderSubmitForm(){
    app.innerHTML = `
      <div class="submit-root">
        <div class="submit-card">
          <h1 style="text-align:center;">${HEART} บอกรักแม่ผ่านมือถือ</h1>
          <p class="lead">ข้อความและรูปของคุณจะขึ้นจอทันที</p>

          <label for="nameInput">ชื่อผู้ส่ง (ไม่บังคับ)</label>
          <input type="text" id="nameInput" placeholder="เช่น ทีมบัญชี" maxlength="40">

          <label for="msgInput">ข้อความบอกรัก</label>
          <textarea id="msgInput" placeholder="เขียนคำอวยพรถึงคุณแม่..." maxlength="220"></textarea>

          <label>แนบรูปคู่กับคุณแม่ (ไม่บังคับ)</label>
          <label class="file-btn" for="photoInput">📷 เลือกรูปภาพ</label>
          <input type="file" id="photoInput" accept="image/*">
          <div id="previewArea"></div>
          <div class="hint">รองรับ .jpg .png ระบบจะย่อขนาดรูปให้อัตโนมัติ</div>

          <button class="submit-btn" id="sendBtn">ติดสติกเกอร์ให้แม่ ${HEART}</button>
          <div class="err-text" id="errText"></div>
        </div>
      </div>
    `;

    const photoInput = document.getElementById('photoInput');
    const previewArea = document.getElementById('previewArea');
    const errText = document.getElementById('errText');

    photoInput.addEventListener('change', () => {
      const file = photoInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const maxW = 900;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          selectedImageDataUrl = canvas.toDataURL('image/jpeg', 0.72);
          previewArea.innerHTML = `
            <div class="preview-wrap">
              <img src="${selectedImageDataUrl}">
              <button class="remove-photo" id="removePhoto">✕</button>
            </div>`;
          document.getElementById('removePhoto').onclick = () => {
            selectedImageDataUrl = null;
            previewArea.innerHTML = '';
            photoInput.value = '';
          };
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const name = document.getElementById('nameInput').value.trim();
      const message = document.getElementById('msgInput').value.trim();
      errText.style.display = 'none';

      if(!message && !selectedImageDataUrl){
        errText.textContent = 'กรุณาพิมพ์ข้อความ หรือแนบรูปภาพอย่างน้อยหนึ่งอย่าง';
        errText.style.display = 'block';
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = 'กำลังส่ง...';

      const flagged = isRisky(message) || isRisky(name);
      const entry = {
        name: name || '',
        message: message || '',
        image: selectedImageDataUrl || null,
        ts: Date.now(),
        status: flagged ? 'pending' : 'approved'
      };

      try{
        if(!FIREBASE_READY){ throw new Error('Firebase not configured'); }
        await firebase.database().ref('entries').push(entry);
        renderThanks(flagged);
      }catch(e){
        console.error(e);
        errText.textContent = 'ส่งไม่สำเร็จ กรุณาลองใหม่อีกครั้ง';
        errText.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'ติดสติกเกอร์ให้แม่ ' + HEART;
      }
    });
  }

  function renderThanks(flagged){
    app.innerHTML = `
      <div class="submit-root">
        <div class="thanks-screen">
          <div class="big-icon">${HEART}</div>
          <h1>ส่งเรียบร้อยแล้ว!</h1>
          <p>${flagged
            ? 'ขอบคุณที่ร่วมบอกรักแม่ ข้อความของคุณกำลังรอทีมงานตรวจสอบก่อนขึ้นจอ'
            : 'ขอบคุณที่ร่วมบอกรักแม่ ข้อความของคุณกำลังจะขึ้นจอแล้ว'}</p>
          <button class="again-btn" id="againBtn">ส่งอีกข้อความ</button>
        </div>
      </div>
    `;
    document.getElementById('againBtn').onclick = () => {
      selectedImageDataUrl = null;
      renderSubmitForm();
    };
  }

  /* ===================== ADMIN VIEW ===================== */
  let adminImageDataUrl = null;

  function renderAdminGate(){
    app.innerHTML = `
      <div class="admin-root">
        <div class="pin-gate">
          <h2>เข้าสู่ระบบแอดมิน</h2>
          <input type="password" id="pinInput" inputmode="numeric" maxlength="10" placeholder="รหัสผ่าน">
          <button id="pinBtn">เข้าสู่ระบบ</button>
          <div class="pin-err" id="pinErr">รหัสไม่ถูกต้อง</div>
        </div>
      </div>
    `;
    const tryLogin = () => {
      const val = document.getElementById('pinInput').value;
      if(val === ADMIN_PIN){ renderAdminPanel(); }
      else{ document.getElementById('pinErr').style.display = 'block'; }
    };
    document.getElementById('pinBtn').onclick = tryLogin;
    document.getElementById('pinInput').addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });
  }

  function renderAdminPanel(){
    app.innerHTML = `
      <div class="admin-root">
        <div class="admin-wrap">
          <h1>${HEART} จัดการข้อความ (แอดมิน)</h1>
          <p class="admin-sub">อนุมัติ ลบ หรือเพิ่มข้อความเข้าจอทีวีได้จากหน้านี้</p>

          <div class="quick-add">
            <h3>+ เพิ่มข้อความเอง (ขึ้นจอทันที)</h3>
            <input type="text" id="qaName" placeholder="ชื่อผู้ส่ง (ไม่บังคับ)">
            <textarea id="qaMsg" placeholder="ข้อความ..."></textarea>
            <div class="qa-row">
              <label class="qa-file" style="cursor:pointer;">📷 แนบรูป <input type="file" id="qaFile" accept="image/*" style="display:none;"></label>
              <span id="qaFileName" style="font-size:12px;color:#888;"></span>
              <button id="qaAddBtn" style="margin-left:auto;">เพิ่มเข้าจอ</button>
            </div>
          </div>

          <div id="adminList"></div>
        </div>
      </div>
    `;

    document.getElementById('qaFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      document.getElementById('qaFileName').textContent = file.name;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const maxW = 900;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          adminImageDataUrl = canvas.toDataURL('image/jpeg', 0.72);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('qaAddBtn').addEventListener('click', async () => {
      const name = document.getElementById('qaName').value.trim();
      const message = document.getElementById('qaMsg').value.trim();
      if(!message && !adminImageDataUrl){ alert('กรุณาพิมพ์ข้อความ หรือแนบรูปภาพ'); return; }
      try{
        await firebase.database().ref('entries').push({
          name: name || '', message: message || '', image: adminImageDataUrl || null,
          ts: Date.now(), status: 'approved'
        });
        document.getElementById('qaName').value = '';
        document.getElementById('qaMsg').value = '';
        document.getElementById('qaFileName').textContent = '';
        adminImageDataUrl = null;
      }catch(e){ console.error(e); alert('เพิ่มไม่สำเร็จ ลองใหม่อีกครั้ง'); }
    });

    firebase.database().ref('entries').limitToLast(200).on('value', (snapshot) => {
      const list = document.getElementById('adminList');
      if(!list) return;
      const items = [];
      snapshot.forEach(child => items.push({key: child.key, data: child.val()}));
      items.reverse(); // newest first

      if(items.length === 0){
        list.innerHTML = `<div class="admin-empty">ยังไม่มีข้อความส่งเข้ามา</div>`;
        return;
      }

      list.innerHTML = items.map(({key, data}) => {
        const badge = data.status === 'approved'
          ? `<span class="badge badge-approved">อนุมัติแล้ว</span>`
          : `<span class="badge badge-pending">รอตรวจสอบ</span>`;
        const time = data.ts ? new Date(data.ts).toLocaleString('th-TH') : '';
        return `
          <div class="admin-item">
            ${data.image ? `<img src="${data.image}">` : ''}
            <div class="ai-body">
              ${badge}
              <div class="ai-msg">${escapeHtml(data.message || '(ไม่มีข้อความ)')}</div>
              <div class="ai-meta">${data.name ? escapeHtml(data.name) + ' · ' : ''}${time}</div>
            </div>
            <div class="ai-actions">
              ${data.status !== 'approved' ? `<button class="btn-approve" data-act="approve" data-key="${key}">อนุมัติ</button>` : ''}
              <button class="btn-reject" data-act="reject" data-key="${key}">ลบ</button>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.key;
          try{
            if(btn.dataset.act === 'approve'){
              await firebase.database().ref('entries/' + key).update({status: 'approved'});
            }else{
              if(confirm('ลบข้อความนี้?')){
                await firebase.database().ref('entries/' + key).remove();
              }
            }
          }catch(e){ console.error(e); alert('ทำรายการไม่สำเร็จ'); }
        });
      });
    });
  }

  function startAdmin(){
    if(!FIREBASE_READY){
      app.innerHTML = `<div class="admin-root"><div class="pin-gate"><h2>ยังไม่ได้ตั้งค่า Firebase</h2></div></div>`;
      return;
    }
    renderAdminGate();
  }

  /* ===================== ROUTER ===================== */
  if(mode === 'submit'){
    renderSubmitForm();
  } else if(mode === 'admin'){
    startAdmin();
  } else {
    startWall();
  }
})();
</script>
</body>
</html>
